<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Graph Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding: 1rem;
      height: 100vh;
    }
    #chart {
      flex: 1;
      width: 100% !important;
      height: 100% !important;
    }
    #value-form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    #value-form input {
      flex: 1 1 auto;
    }
    #values-list {
      max-height: 20vh;
      overflow: auto;
      margin: 0;
      padding-left: 1.25rem;
    }
  </style>
</head>
<body>
  <h1>Real-Time Graph with WebSockets</h1>
  <canvas id="chart"></canvas>

  <h2>Persist a Value</h2>
  <form id="value-form">
    <input type="text" id="key" placeholder="Key" required />
    <input type="text" id="value" placeholder="Value" />
    <button type="submit">Save</button>
  </form>

  <h3>Saved Values</h3>
  <ul id="values-list"></ul>

  <script src="app.js"></script>
</body>
</html>
